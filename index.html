<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine</title>
<style>
  :root {
    --navy: #0b1f3a;        /* deep reading-room blue */
    --navy-soft: #14304f;
    --gold: #f7a81b;        /* Rotary gold accent */
    --paper: #f5f2ea;
    --text-dim: #9db2c9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: radial-gradient(1200px 700px at 50% 30%, var(--navy-soft), var(--navy) 70%);
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
  }

  /* ---------- Loading screen ---------- */
  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; color: var(--text-dim);
    z-index: 50;
  }
  #loader .ring {
    width: 46px; height: 46px;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 14px; letter-spacing: .08em; }

  /* ---------- Book area ---------- */
  #stage {
    position: fixed;
    inset: 0 0 64px 0;              /* leave room for the toolbar */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #book {
    filter: drop-shadow(0 24px 40px rgba(0,0,0,.55));
  }
  #book img.page-img {
    width: 100%; height: 100%;
    object-fit: cover;
    background: var(--paper);
  }

  /* ---------- Toolbar ---------- */
  #toolbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(5, 14, 27, .65);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(247,168,27,.25);
  }
  .tb-btn {
    appearance: none;
    background: none;
    border: 1px solid rgba(247,168,27,.5);
    color: var(--gold);
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    transition: background .2s, transform .15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .tb-btn:hover { background: rgba(247,168,27,.15); }
  .tb-btn:active { transform: scale(.92); }
  .tb-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  #pageInfo {
    color: var(--text-dim);
    font-size: 14px;
    min-width: 76px;
    text-align: center;
    letter-spacing: .06em;
    font-variant-numeric: tabular-nums;
  }

  #fsBtn, #dlBtn, #loopBtn { font-size: 16px; }

  @media (max-width: 600px) {
    #stage { padding: 8px; inset: 0 0 58px 0; }
    #toolbar { height: 58px; gap: 10px; }
    .tb-btn { width: 38px; height: 38px; }
    #pageInfo { min-width: 60px; font-size: 13px; }
  }

  @media (prefers-reduced-motion: reduce) {
    #loader .ring { animation-duration: 3s; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="ring"></div>
  <p>Loading magazine… / Ачааллаж байна…</p>
</div>

<div id="stage">
  <div id="book"></div>
</div>

<div id="toolbar" hidden>
  <button class="tb-btn" id="loopBtn" aria-label="Back to cover" title="Back to cover">↺</button>
  <button class="tb-btn" id="prevBtn" aria-label="Previous page">‹</button>
  <div id="pageInfo">– / –</div>
  <button class="tb-btn" id="nextBtn" aria-label="Next page">›</button>
  <a class="tb-btn" id="dlBtn" aria-label="Download PDF" title="Download PDF" download>⬇</a>
  <button class="tb-btn" id="fsBtn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
(async function () {
  // ============================================================
  // Which PDF to open:
  //   yoursite/                       -> opens magazine.pdf
  //   yoursite/?pdf=magazine2.pdf     -> opens magazine2.pdf
  //   yoursite/?pdf=any-name.pdf      -> opens that file
  // ============================================================
  const DEFAULT_PDF = "magazine.pdf";
  let PDF_URL = new URLSearchParams(location.search).get("pdf") || DEFAULT_PDF;
  // Safety: only allow simple .pdf filenames from this same site
  if (!/^[\w\-. ]+\.pdf$/i.test(PDF_URL)) PDF_URL = DEFAULT_PDF;

  const loader   = document.getElementById("loader");
  const toolbar  = document.getElementById("toolbar");
  const pageInfo = document.getElementById("pageInfo");

  // Download button points straight at the PDF file
  const dlBtn = document.getElementById("dlBtn");
  dlBtn.href = PDF_URL;
  dlBtn.setAttribute("download", PDF_URL.split("/").pop());

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  try {
    const pdf = await pdfjsLib.getDocument(PDF_URL).promise;

    // Render every PDF page to an image
    const images = [];
    let pageW = 0, pageH = 0;

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 1.6 });
      if (i === 1) { pageW = viewport.width; pageH = viewport.height; }

      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
      images.push(canvas.toDataURL("image/jpeg", 0.85));

      loader.querySelector("p").textContent =
        "Loading page " + i + " / " + pdf.numPages + " …";
    }

    let pageFlip = null;
    let currentIndex = 0;

    function fitSize() {
      const toolbarH = window.innerWidth <= 600 ? 58 : 64;
      const pad = window.innerWidth <= 600 ? 16 : 48;
      const maxH = window.innerHeight - toolbarH - pad;
      const maxW = window.innerWidth - pad;
      let h = maxH;
      let w = h * (pageW / pageH);
      // In landscape/desktop two pages sit side by side and must fit
      const portrait = window.innerWidth < window.innerHeight || window.innerWidth <= 600;
      const totalW = portrait ? w : w * 2;
      if (totalW > maxW) {
        w = portrait ? maxW : maxW / 2;
        h = w * (pageH / pageW);
      }
      return { w: Math.round(w), h: Math.round(h) };
    }

    function buildBook(startIndex) {
      const old = document.getElementById("book");
      if (pageFlip) { try { pageFlip.destroy(); } catch (e) {} }
      const fresh = document.createElement("div");
      fresh.id = "book";
      old.replaceWith(fresh);

      const { w, h } = fitSize();
      pageFlip = new St.PageFlip(fresh, {
        width: w,
        height: h,
        size: "fixed",
        showCover: true,            // first page displayed alone, like a real cover
        usePortrait: true,          // single-page view on phones
        maxShadowOpacity: 0.4,
        mobileScrollSupport: false,
        startPage: startIndex
      });
      pageFlip.loadFromImages(images);
      pageFlip.on("flip", (e) => {
        currentIndex = e.data;
        update();
      });
      update();
    }

    const update = () => {
      pageInfo.textContent = (currentIndex + 1) + " / " + pdf.numPages;
    };

    buildBook(0);
    loader.remove();
    toolbar.hidden = false;

    // --- Buttons ---
    document.getElementById("prevBtn").onclick = () => pageFlip.flipPrev();
    document.getElementById("nextBtn").onclick = () => pageFlip.flipNext();

    // Loop: go back to the cover (page 1)
    document.getElementById("loopBtn").onclick = () => {
      pageFlip.flip(0);
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft")  pageFlip.flipPrev();
      if (e.key === "ArrowRight") pageFlip.flipNext();
      if (e.key === "Home")       pageFlip.flip(0);
    });

    document.getElementById("fsBtn").onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    };

    // Re-fit the book when screen changes: fullscreen on/off,
    // phone rotation, window resize
    let resizeTimer = null;
    function refit() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => buildBook(currentIndex), 250);
    }
    window.addEventListener("resize", refit);
    document.addEventListener("fullscreenchange", refit);
    window.addEventListener("orientationchange", refit);

  } catch (err) {
    loader.querySelector(".ring").style.display = "none";
    loader.querySelector("p").textContent =
      "Could not load \"" + PDF_URL + "\". Make sure the PDF file is in the same folder and the name matches.";
    console.error(err);
  }
})();
</script>
</body>
</html>
