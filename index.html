<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazine</title>
<style>
  :root {
    --navy: #0b1f3a;        /* deep reading-room blue */
    --navy-soft: #14304f;
    --gold: #f7a81b;        /* Rotary gold accent */
    --paper: #f5f2ea;
    --text-dim: #9db2c9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: radial-gradient(1200px 700px at 50% 30%, var(--navy-soft), var(--navy) 70%);
    font-family: Georgia, "Times New Roman", serif;
    overflow: hidden;
  }

  /* ---------- Loading screen ---------- */
  #loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; color: var(--text-dim);
    z-index: 50;
  }
  #loader .ring {
    width: 46px; height: 46px;
    border: 3px solid rgba(255,255,255,.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 14px; letter-spacing: .08em; }

  /* ---------- Book area ---------- */
  #stage {
    position: fixed;
    inset: 0 0 64px 0;              /* leave room for the toolbar */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #book {
    filter: drop-shadow(0 24px 40px rgba(0,0,0,.55));
  }
  #book img.page-img {
    width: 100%; height: 100%;
    object-fit: cover;
    background: var(--paper);
  }

  /* ---------- Toolbar ---------- */
  #toolbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    background: rgba(5, 14, 27, .65);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(247,168,27,.25);
  }
  .tb-btn {
    appearance: none;
    background: none;
    border: 1px solid rgba(247,168,27,.5);
    color: var(--gold);
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    transition: background .2s, transform .15s;
    font-family: inherit;
  }
  .tb-btn:hover { background: rgba(247,168,27,.15); }
  .tb-btn:active { transform: scale(.92); }
  .tb-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  #pageInfo {
    color: var(--text-dim);
    font-size: 14px;
    min-width: 90px;
    text-align: center;
    letter-spacing: .06em;
    font-variant-numeric: tabular-nums;
  }

  #fsBtn { font-size: 15px; }

  @media (max-width: 600px) {
    #stage { padding: 10px; inset: 0 0 58px 0; }
    #toolbar { height: 58px; gap: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    #loader .ring { animation-duration: 3s; }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="ring"></div>
  <p>Loading magazine… / Ачааллаж байна…</p>
</div>

<div id="stage">
  <div id="book"></div>
</div>

<div id="toolbar" hidden>
  <button class="tb-btn" id="prevBtn" aria-label="Previous page">‹</button>
  <div id="pageInfo">– / –</div>
  <button class="tb-btn" id="nextBtn" aria-label="Next page">›</button>
  <button class="tb-btn" id="fsBtn" aria-label="Fullscreen" title="Fullscreen">⛶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
(async function () {
  // ======= CHANGE THIS if your PDF has a different name =======
  const PDF_URL = "magazine.pdf";
  // =============================================================

  const loader   = document.getElementById("loader");
  const bookEl   = document.getElementById("book");
  const toolbar  = document.getElementById("toolbar");
  const pageInfo = document.getElementById("pageInfo");

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  try {
    const pdf = await pdfjsLib.getDocument(PDF_URL).promise;

    // Render every PDF page to an image
    const images = [];
    let pageW = 0, pageH = 0;

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 1.6 });
      if (i === 1) { pageW = viewport.width; pageH = viewport.height; }

      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
      images.push(canvas.toDataURL("image/jpeg", 0.85));

      loader.querySelector("p").textContent =
        "Loading page " + i + " / " + pdf.numPages + " …";
    }

    // Fit the book to the window
    const maxH = window.innerHeight - 64 - 48;
    const maxW = window.innerWidth - 48;
    let h = Math.min(maxH, 900);
    let w = h * (pageW / pageH);
    if (w * 2 > maxW) {           // two pages side by side must fit
      w = Math.min(w, maxW / 2);
      h = w * (pageH / pageW);
    }

    const pageFlip = new St.PageFlip(bookEl, {
      width: Math.round(w),
      height: Math.round(h),
      size: "fixed",
      showCover: true,            // first page displayed alone, like a real cover
      usePortrait: true,          // single-page view on phones
      maxShadowOpacity: 0.4,
      mobileScrollSupport: false
    });

    pageFlip.loadFromImages(images);

    loader.remove();
    toolbar.hidden = false;

    const update = () => {
      pageInfo.textContent =
        (pageFlip.getCurrentPageIndex() + 1) + " / " + pdf.numPages;
    };
    update();
    pageFlip.on("flip", update);

    document.getElementById("prevBtn").onclick = () => pageFlip.flipPrev();
    document.getElementById("nextBtn").onclick = () => pageFlip.flipNext();

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft")  pageFlip.flipPrev();
      if (e.key === "ArrowRight") pageFlip.flipNext();
    });

    document.getElementById("fsBtn").onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    };

  } catch (err) {
    loader.querySelector(".ring").style.display = "none";
    loader.querySelector("p").textContent =
      "Could not load \"" + PDF_URL + "\". Make sure the PDF file is in the same folder and the name matches.";
    console.error(err);
  }
})();
</script>
</body>
</html>
